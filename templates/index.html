<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quantarion AI - Hybrid Quantum Machine Learning Platform">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" href="/static/manifest.json">
    <title>Quantarion AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Animated particle background -->
    <div class="particles" id="particles"></div>
    
    <!-- Main container -->
    <div class="container">
        <!-- Header with logo -->
        <header class="header">
            <div class="logo-container">
                <div class="atom-logo">
                    <div class="nucleus"></div>
                    <div class="electron electron-1"></div>
                    <div class="electron electron-2"></div>
                    <div class="electron electron-3"></div>
                </div>
                <div class="header-text">
                    <h1>Quantarion AI</h1>
                    <p>Hybrid Quantum Machine Learning</p>
                </div>
            </div>
            
            <!-- Language toggle -->
            <div class="language-toggle">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="hi">हिंदी</button>
            </div>
        </header>

        <!-- Main content -->
        <main class="main-content">
            <!-- Input section -->
            <section class="input-section">
                <div class="input-container">
                    <textarea 
                        id="questionInput" 
                        class="question-input" 
                        placeholder="Ask anything..." 
                        rows="3"
                    ></textarea>
                    <button class="solve-btn" id="solveBtn">
                        <span>Solve with Quantum</span>
                        <span class="pulse-ring"></span>
                    </button>
                </div>
            </section>

            <!-- Example questions -->
            <section class="examples-section">
                <h3 class="examples-title" id="examplesTitle">Example Questions</h3>
                <div class="examples-grid">
                    <button class="example-btn" data-type="optimization" id="ex1">
                        <span class="example-icon">⚡</span>
                        <span class="example-text" id="exOptimization">Optimization Problem</span>
                    </button>
                    <button class="example-btn" data-type="calculation" id="ex2">
                        <span class="example-icon">🧮</span>
                        <span class="example-text" id="exCalculation">Quantum Calculation</span>
                    </button>
                    <button class="example-btn" data-type="pattern" id="ex3">
                        <span class="example-icon">🎯</span>
                        <span class="example-text" id="exPattern">Pattern Recognition</span>
                    </button>
                    <button class="example-btn" data-type="decision" id="ex4">
                        <span class="example-icon">🔮</span>
                        <span class="example-text" id="exDecision">Decision Making</span>
                    </button>
                </div>
            </section>

            <!-- Loading animation -->
            <div class="loading-container hidden" id="loadingContainer">
                <div class="quantum-loader">
                    <div class="electron-orbit"></div>
                    <div class="electron-particle"></div>
                    <span class="loader-text" id="loaderText">Processing...</span>
                </div>
            </div>

            <!-- Results section -->
            <section class="results-section hidden" id="resultsSection">
                <div class="results-container">
                    <div class="result-header">
                        <h2 id="resultTitle">Result</h2>
                        <button class="close-btn" id="closeResultsBtn">×</button>
                    </div>

                    <!-- Answer -->
                    <div class="answer-box">
                        <p id="answerText"></p>
                    </div>

                    <!-- Quantum stats -->
                    <div class="quantum-stats">
                        <div class="stat-card">
                            <span class="stat-label" id="statQuantumLabel">Quantum State</span>
                            <span class="stat-value" id="statQuantum">|00000⟩</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label" id="statProbLabel">Probability</span>
                            <span class="stat-value" id="statProb">0%</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label" id="statAccuracyLabel">Accuracy</span>
                            <span class="stat-value" id="statAccuracy">0%</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label" id="statMitigationLabel">Error Mitigation</span>
                            <span class="stat-value" id="statMitigation">ZNE</span>
                        </div>
                    </div>

                    <!-- Numbers used -->
                    <div class="numbers-section">
                        <h4 id="numbersUsedLabel">Numbers Used</h4>
                        <div class="numbers-display" id="numbersDisplay"></div>
                    </div>

                    <!-- Copy button -->
                    <button class="copy-btn" id="copyBtn">
                        <span id="copyBtnText">Copy Result</span>
                    </button>
                </div>
            </section>

            <!-- Error message -->
            <div class="error-container hidden" id="errorContainer">
                <div class="error-box">
                    <p id="errorText"></p>
                    <button class="error-close-btn" id="closeErrorBtn">×</button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p id="footerText">Powered by Quantum Computing & AI</p>
        </footer>
    </div>

    <!-- Toast notification -->
    <div class="toast hidden" id="toast">
        <span id="toastText"></span>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
