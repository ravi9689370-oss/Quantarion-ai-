<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quantarion AI - Hybrid Quantum Machine Learning Platform">
    <meta name="theme-color" content="#1e1b4b">
    <title>Quantarion AI - Quantum ML Platform</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%236366f1' stroke-width='2'/><circle cx='50' cy='50' r='10' fill='%236366f1'/><circle cx='50' cy='20' r='5' fill='%236366f1'/><circle cx='75' cy='65' r='5' fill='%236366f1'/><circle cx='25' cy='65' r='5' fill='%236366f1'/></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background">
        <div class="particles" id="particles"></div>
        <div class="gradient-bg"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-container">
                    <div class="atom-logo">
                        <div class="nucleus"></div>
                        <div class="electron orbit-1"></div>
                        <div class="electron orbit-2"></div>
                        <div class="electron orbit-3"></div>
                    </div>
                </div>
                <div class="header-text">
                    <h1>Quantarion AI</h1>
                    <p>Hybrid Quantum Machine Learning Platform</p>
                </div>
                <button class="language-toggle" id="languageToggle" title="Toggle language">EN/हिं</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <div class="input-container">
                    <label for="questionInput" class="input-label" id="inputLabel">Ask a Quantum Question</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="questionInput" 
                            class="question-input" 
                            placeholder="e.g., What is 42 + 8 using quantum computing?" 
                            autocomplete="off"
                        >
                        <button class="submit-btn" id="submitBtn" title="Submit question">
                            <span class="btn-text" id="submitBtnText">Process</span>
                            <span class="loader" id="loader"></span>
                        </button>
                    </div>
                </div>

                <!-- Example Questions -->
                <div class="examples-section">
                    <p class="examples-label" id="examplesLabel">Example Questions:</p>
                    <div class="examples-grid">
                        <button class="example-btn" data-question="optimization" id="exOptimization">
                            <span class="icon">⚙️</span>
                            <span class="text" id="exOptimizationText">Optimization</span>
                        </button>
                        <button class="example-btn" data-question="calculation" id="exCalculation">
                            <span class="icon">🧮</span>
                            <span class="text" id="exCalculationText">Calculation</span>
                        </button>
                        <button class="example-btn" data-question="pattern" id="exPattern">
                            <span class="icon">🔍</span>
                            <span class="text" id="exPatternText">Pattern</span>
                        </button>
                        <button class="example-btn" data-question="decision" id="exDecision">
                            <span class="icon">🎯</span>
                            <span class="text" id="exDecisionText">Decision</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Results Section -->
            <section class="results-section" id="resultsSection">
                <div class="result-card" id="resultCard">
                    <div class="result-header">
                        <h2 class="result-title" id="resultTitle">Quantum Computation Result</h2>
                        <button class="copy-btn" id="copyBtn" title="Copy result to clipboard">
                            <span class="copy-icon">📋</span>
                            <span class="copy-text" id="copyText">Copy</span>
                        </button>
                    </div>

                    <!-- Question Display -->
                    <div class="result-item">
                        <label class="result-label" id="questionLabel">Your Question:</label>
                        <p class="result-value" id="resultQuestion"></p>
                    </div>

                    <!-- Answer Display -->
                    <div class="result-item">
                        <label class="result-label" id="answerLabel">Answer:</label>
                        <p class="result-value answer-text" id="resultAnswer"></p>
                    </div>

                    <!-- Quantum Stats -->
                    <div class="quantum-stats">
                        <div class="stat-box">
                            <label class="stat-label" id="stateLabel">Quantum State</label>
                            <p class="stat-value" id="resultState">|00⟩</p>
                        </div>
                        <div class="stat-box">
                            <label class="stat-label" id="probabilityLabel">Probability</label>
                            <p class="stat-value" id="resultProbability">0%</p>
                        </div>
                        <div class="stat-box">
                            <label class="stat-label" id="numbersLabel">Numbers Used</label>
                            <p class="stat-value" id="resultNumbers">-</p>
                        </div>
                        <div class="stat-box">
                            <label class="stat-label" id="accuracyLabel">Accuracy</label>
                            <p class="stat-value" id="resultAccuracy">0%</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Toast Notification -->
        <div class="toast" id="toast"></div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
